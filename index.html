<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Visuals - Menu Recreated</title>
    <style>
        /* Основные стили страницы */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0d0d0f; /* Очень темный фон, как в игре */
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Похожий чистый шрифт */
            color: #d8d8e0; /* Светло-серый текст */
        }

        /* Главный контейнер меню */
        .menu-container {
            width: 720px;
            background-color: #121217; /* Чуть светлее фона, цвет панели */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* Тень для объема */
            overflow: hidden; /* Чтобы вкладки не вылезали за скругления */
            padding-bottom: 20px;
        }

        /* Вкладки навигации (Visuals, HUD, Utilities) */
        .tabs {
            display: flex;
            background-color: #1a1a21; /* Еще чуть светлее для заголовка */
            padding: 10px 20px;
            border-bottom: 1px solid #282833;
        }

        .tab {
            padding: 10px 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.2s;
        }

        .tab.active {
            color: #b388ff; /* Яркий фиолетовый для активной вкладки */
            border-bottom: 2px solid #b388ff;
        }

        .tab:not(.active):hover {
            color: #ffffff;
        }

        /* Сетка для списка функций */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Две колонки */
            gap: 15px;
            padding: 25px;
        }

        /* Стили для каждой опции (название + переключатель) */
        .option {
            background-color: transparent; /* Скриншот показывает прозрачный фон элементов */
            padding: 12px 18px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }

        /* Подсветка при наведении, как "Custom Hand" на скриншоте */
        .option:hover {
            background-color: rgba(179, 136, 255, 0.08); /* Очень легкий фиолетовый фон */
        }

        .option-name {
            font-size: 15px;
            color: #e0e0e6;
        }

        /* --- Стилизация переключателя (Toggle Switch) --- */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* "Ползунок" переключателя */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #31313e; /* Цвет выключенного переключателя */
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #d8d8e0; /* Цвет кружка */
            transition: .4s;
            border-radius: 50%;
        }

        /* Стили при включении */
        input:checked + .slider {
            background-color: #9c27b0; /* Фиолетовый фон при включении */
        }

        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: #ffffff;
        }

        /* Необязательный заголовок окна */
        .menu-header {
            padding: 15px 20px 0 20px;
            font-size: 12px;
            color: #6a6a7a;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="menu-container">
        <div class="tabs">
            <div class="tab active">Visuals</div>
            <div class="tab">HUD</div>
            <div class="tab">Utilities</div>
        </div>

        <div class="settings-grid">
            
            <div class="option">
                <span class="option-name">Full Bright</span>
                <label class="switch">
                    <input type="checkbox" checked> <span class="slider"></span>
                </label>
            </div>
            
            <div class="option">
                <span class="option-name">Particles</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="option">
                <span class="option-name">Aspect Ratio</span>
                <label class="switch">
                    <input type="checkbox"> <span class="slider"></span>
                </label>
            </div>

            <div class="option">
                <span class="option-name">Crosshair</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="option">
                <span class="option-name">China Hit</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="option" style="background-color: rgba(179, 136, 255, 0.1);">
                <span class="option-name">Custom Hand</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="option">
                <span class="option-name">Hit Color</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="option">
                <span class="option-name">Render Tweaks</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

        </div>
    </div>

</body>
</html>
