<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pulse Visuals Full Interface</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --panel-bg: #111116;
            --card-bg: #16161d;
            --accent: #7d5fff;
            --text-main: #ffffff;
            --text-dim: #5c5c6d;
            --border: #22222e;
        }

        body {
            background: #050505; /* Фон как в игре */
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Логотип сверху */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .logo span { color: var(--accent); font-size: 28px; }

        /* Главное окно */
        .window {
            width: 820px;
            height: 480px;
            background: var(--panel-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        /* Шапка окна */
        .header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tabs { display: flex; gap: 20px; font-size: 14px; }
        .tabs span { cursor: pointer; color: var(--text-dim); transition: 0.2s; }
        .tabs span.active { color: var(--text-main); }

        .search-area {
            background: #1a1a23;
            padding: 6px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2a2a3a;
        }
        .search-area input {
            background: none; border: none; color: white; font-size: 13px; outline: none; width: 140px;
        }

        /* Контентная область */
        .content {
            padding: 0 30px 20px 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            overflow-y: auto;
            height: 100%;
        }

        /* Карточка настройки */
        .card {
            background: var(--card-bg);
            padding: 14px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            cursor: pointer;
        }
        .card:hover { background: #1c1c26; }
        .card-label { font-size: 14px; font-weight: 500; }

        /* Кастомная стрелочка (Download Icon) из конфигов */
        .dl-icon {
            width: 32px;
            height: 32px;
            background: #252533;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a0a0b0;
            transition: 0.2s;
        }
        .dl-icon:hover { background: var(--accent); color: white; }

        /* Переключатель */
        .tog {
            width: 38px;
            height: 20px;
            background: #2a2a3a;
            border-radius: 15px;
            position: relative;
            transition: 0.3s;
        }
        .tog.active { background: var(--accent); }
        .tog::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            top: 3px; left: 3px;
            transition: 0.3s;
        }
        .tog.active::after { left: 21px; }

        /* Нижний Док */
        .dock {
            position: absolute;
            bottom: -75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 20, 0.95);
            padding: 10px 18px;
            border-radius: 16px;
            display: flex;
            gap: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
        }

        .dock-btn {
            width: 42px;
            height: 42px;
            background: #1c1c26;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            color: #888;
        }
        .dock-btn.active { background: var(--accent); color: white; }

        /* Стили для меню Конфигураций */
        .config-item {
            grid-column: span 2;
            border: 1px solid #2a2a3a;
            background: rgba(22, 22, 29, 0.5);
        }
        .config-info { display: flex; flex-direction: column; }
        .config-date { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }

    </style>
</head>
<body>

    <div class="logo"><span>⚡</span> PulseVisuals</div>

    <div class="window">
        <div class="header" id="window-header">
            </div>

        <div class="content" id="main-content">
            </div>

        <div class="dock">
            <div class="dock-btn active" onclick="nav('visuals', 0)">⚙️</div>
            <div class="dock-btn" onclick="nav('hud', 1)">🖼️</div>
            <div class="dock-btn" onclick="nav('social', 2)">👥</div>
            <div class="dock-btn" onclick="nav('box', 3)">🎁</div>
            <div class="dock-btn" onclick="nav('configs', 4)">📄</div>
        </div>
    </div>

    <script>
        // Данные для разделов
        const data = {
            visuals: [
                { name: "Animations", val: true }, { name: "Target ESP", val: true },
                { name: "Trails", val: true }, { name: "World Customizer", val: true },
                { name: "Full Bright", val: true }, { name: "Nimb", val: false },
                { name: "Particles", val: false }, { name: "Render Tweaks", val: false }
            ],
            hud: [
                { name: "Watermark", val: true }, { name: "Effect Notify", val: true },
                { name: "Armor HUD", val: false }, { name: "Target HUD", val: false }
            ],
            configs: [
                { name: "Default", date: "10.02 14:28", isConfig: true },
                { name: "Анимчик • Anim4k", date: "11.02 10:12", isConfig: true },
                { name: "Флерни • Flerni", date: "12.02 16:12", isConfig: true }
            ]
        };

        function render(section) {
            const container = document.getElementById('main-content');
            const header = document.getElementById('window-header');
            container.innerHTML = '';

            // Обновляем шапку
            if (section === 'configs') {
                header.innerHTML = `<span style="font-weight:bold">Конфигурации</span><div class="search-area">🔍<input type="text" placeholder="Поиск"></div>`;
            } else {
                header.innerHTML = `
                    <div class="tabs">
                        <span class="${section === 'visuals' ? 'active' : ''}" onclick="nav('visuals', 0)">Visuals</span> / 
                        <span class="${section === 'hud' ? 'active' : ''}" onclick="nav('hud', 1)">HUD</span> / 
                        <span>Utilities</span>
                    </div>
                    <div class="search-area">🔍<input type="text" placeholder="Поиск"></div>`;
            }

            // Отрисовка элементов
            const items = data[section] || [];
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = item.isConfig ? 'card config-item' : 'card';
                
                if (item.isConfig) {
                    div.innerHTML = `
                        <div class="config-info">
                            <span class="config-date">${item.date}</span>
                            <span class="card-label">${item.name}</span>
                        </div>
                        <div class="dl-icon">📥</div>
                    `;
                } else {
                    div.innerHTML = `
                        <span class="card-label">${item.name}</span>
                        <div class="tog ${item.val ? 'active' : ''}" onclick="toggle(this)"></div>
                    `;
                }
                container.appendChild(div);
            });
        }

        function toggle(el) {
            el.classList.toggle('active');
        }

        function nav(section, idx) {
            // Активация кнопки в доке
            document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.dock-btn')[idx].classList.add('active');
            render(section);
        }

        // Запуск
        render('visuals');
    </script>
</body>
</html>
