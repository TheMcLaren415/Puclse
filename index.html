<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PulseVisuals Interface</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --panel-color: #111116;
            --card-color: #16161d;
            --accent-color: #7d5fff; /* Тот самый фиолетовый */
            --text-main: #ffffff;
            --text-dim: #5c5c6d;
            --search-bg: #1a1a23;
        }

        body {
            background: radial-gradient(circle, #1a1a2e 0%, #050505 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Верхний логотип */
        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .pulse-icon {
            color: var(--accent-color);
            font-size: 30px;
        }

        /* Основное окно */
        .main-window {
            width: 850px;
            height: 500px;
            background-color: var(--panel-color);
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #1f1f2e;
        }

        /* Верхняя панель: Вкладки и Поиск */
        .top-bar {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-tabs {
            display: flex;
            gap: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-tabs span {
            cursor: pointer;
            color: var(--text-dim);
            transition: 0.3s;
        }

        .nav-tabs span.active {
            color: var(--text-main);
        }

        .nav-tabs span:hover {
            color: var(--text-main);
        }

        .search-box {
            background: var(--search-bg);
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 180px;
            border: 1px solid #2a2a3a;
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            font-size: 13px;
            outline: none;
            width: 100%;
        }

        /* Сетка настроек */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 30px 30px 30px;
            overflow-y: auto;
        }

        .card {
            background: var(--card-color);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .card:hover {
            border-color: #313145;
            background: #1c1c26;
        }

        .card-name {
            font-size: 14px;
            font-weight: 500;
        }

        /* Переключатель */
        .switch {
            width: 40px;
            height: 22px;
            background: #2a2a3a;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .switch.on {
            background: var(--accent-color);
        }

        .switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: 0.3s;
        }

        .switch.on::after {
            left: 21px;
        }

        /* Нижний док (Navigation Bar) */
        .bottom-dock {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 17, 22, 0.9);
            padding: 10px 20px;
            border-radius: 18px;
            display: flex;
            gap: 15px;
            border: 1px solid #282836;
            backdrop-filter: blur(10px);
        }

        .dock-item {
            width: 40px;
            height: 40px;
            background: #1c1c26;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .dock-item.active {
            background: var(--accent-color);
        }

        .dock-item:hover:not(.active) {
            background: #2a2a3a;
        }

        /* Скроллбар */
        .content-grid::-webkit-scrollbar { width: 5px; }
        .content-grid::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header-logo">
        <span class="pulse-icon">⚡</span> PulseVisuals
    </div>

    <div class="main-window">
        <div class="top-bar">
            <div class="nav-tabs">
                <span onclick="showTab('visuals')" id="tab-visuals">Visuals</span>
                <span onclick="showTab('hud')" id="tab-hud" class="active">HUD</span>
                <span id="tab-utilities">Utilities</span>
            </div>
            <div class="search-box">
                <span style="font-size: 12px; color: #5c5c6d;">🔍</span>
                <input type="text" placeholder="Поиск">
            </div>
        </div>

        <div class="content-grid" id="content">
            </div>

        <div class="bottom-dock">
            <div class="dock-item active">⚙️</div>
            <div class="dock-item">👤</div>
            <div class="dock-item">👥</div>
            <div class="dock-item">🎁</div>
            <div class="dock-item">📜</div>
        </div>
    </div>

    <script>
        const visualsData = [
            { name: "Animations", state: true },
            { name: "Aspect Ratio", state: true },
            { name: "Block Overlay", state: true },
            { name: "China Hat", state: false },
            { name: "Crosshair", state: false },
            { name: "Custom Hand", state: false },
            { name: "Full Bright", state: true },
            { name: "Hit Bubble", state: false },
            { name: "Hit Color", state: true },
            { name: "Hit Sounds", state: true }
        ];

        const hudData = [
            { name: "Armor HUD", state: false },
            { name: "Cooldowns HUD", state: false },
            { name: "Effect Notify", state: true },
            { name: "Hotkeys", state: false },
            { name: "Potions", state: false },
            { name: "Saturation HUD", state: false },
            { name: "Target HUD", state: false },
            { name: "Watermark", state: true }
        ];

        function render(data) {
            const container = document.getElementById('content');
            container.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="card-name">${item.name}</span>
                    <div class="switch ${item.state ? 'on' : ''}" onclick="this.classList.toggle('on')"></div>
                `;
                container.appendChild(card);
            });
        }

        function showTab(type) {
            document.querySelectorAll('.nav-tabs span').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');
            render(type === 'visuals' ? visualsData : hudData);
        }

        // По умолчанию открываем HUD, как на втором скрине
        showTab('hud');
    </script>
</body>
</html>
