<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Visuals ClickGUI</title>
<style>
  body {
    background-color: #1e1e1e;
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 10px;
  }

  .clickgui {
    background-color: #2c2c2c;
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .clickgui button {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background-color: #4a4a4a;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .clickgui button::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: rgba(255, 255, 255, 0.1);
    transform: scale(0);
    border-radius: 50%;
    transition: transform 0.5s ease;
  }

  .clickgui button:hover::after {
    transform: scale(1);
  }

  .clickgui button.active {
    animation: pulse 1s infinite;
    background-color: #6c5ce7;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(108, 92, 231, 0); }
    100% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0); }
  }

  /* Адаптивность для телефонов */
  @media (max-width: 480px) {
    .clickgui {
      padding: 15px;
    }
    .clickgui button {
      font-size: 14px;
      padding: 12px;
    }
  }
</style>
</head>
<body>

<div class="clickgui">
  <button onclick="toggleActive(this)">Visual 1</button>
  <button onclick="toggleActive(this)">Visual 2</button>
  <button onclick="toggleActive(this)">Visual 3</button>
  <button onclick="toggleActive(this)">Visual 4</button>
</div>

<script>
  function toggleActive(button) {
    document.querySelectorAll('.clickgui button').forEach(btn => btn.classList.remove('active'));
    button.classList.add('active');
  }
</script>

</body>
</html>
