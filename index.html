<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pulse Visualization</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a; /* Темный фон для контраста */
            margin: 0;
        }

        /* Контейнер для точки */
        .pulse-container {
            position: relative;
            width: 20px;
            height: 20px;
        }

        /* Сама центральная точка */
        .dot {
            width: 100%;
            height: 100%;
            background-color: #00ff88;
            border-radius: 50%;
            z-index: 2;
            position: relative;
        }

        /* Эффект пульсации (волны) */
        .pulse-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid #00ff88;
            border-radius: 50%;
            box-sizing: border-box;
            animation: pulse-animation 2s infinite ease-out;
        }

        /* Вторая волна с задержкой для красоты */
        .pulse-ring.delay {
            animation-delay: 1s;
        }

        @keyframes pulse-animation {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="pulse-container">
        <div class="dot"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring delay"></div>
    </div>

</body>
</html>
