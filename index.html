<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Plintus UI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1608889175123-8ee362201f81") no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN CONTAINER */
.container {
    display: flex;
    padding: 20px;
    gap: 20px;
    border-radius: 20px;
    backdrop-filter: blur(25px);
    background: rgba(20,20,30,0.65);
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
}

/* SIDEBAR */
.sidebar {
    width: 70px;
    background: rgba(30,30,40,0.7);
    border-radius: 15px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.sidebar div {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar div:hover,
.sidebar .active {
    background: #6c5cff;
    color: white;
}

/* MAIN */
.main {
    width: 600px;
}

.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.header h2 {
    color: white;
}

.search {
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* CARD */
.card {
    padding: 15px;
    border-radius: 15px;
    background: rgba(30,30,40,0.6);
    transition: 0.3s;
    position: relative;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 20px rgba(108,92,255,0.3);
}

.title {
    color: white;
    font-size: 15px;
}

.desc {
    color: #aaa;
    font-size: 12px;
    margin: 5px 0 10px;
}

/* BOTTOM BAR */
.card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ICONS */
.icons {
    display: flex;
    gap: 8px;
}

.icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
}

/* SWITCH */
.switch {
    position: relative;
    width: 42px;
    height: 22px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #555;
    border-radius: 20px;
    transition: 0.3s;
}

.slider:before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: 0.3s;
}

input:checked + .slider {
    background: #6c5cff;
}

input:checked + .slider:before {
    transform: translateX(20px);
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="active">⚔</div>
        <div>👁</div>
        <div>🎨</div>
        <div>⚙</div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <h2>⚔ Combat</h2>
            <input class="search" placeholder="Search">
        </div>

        <div class="grid">

            <!-- CARD -->
            <div class="card">
                <div class="title">Projectile Helper</div>
                <div class="desc">Помогает наводиться на цель</div>
                <div class="card-bottom">
                    <div class="icons">
                        <div class="icon"></div>
                        <div class="icon"></div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <div class="title">Shift Tap</div>
                <div class="desc">Авто присед при ударе</div>
                <div class="card-bottom">
                    <div class="icons"></div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <div class="title">Trigger Bot</div>
                <div class="desc">Бьет если смотришь</div>
                <div class="card-bottom">
                    <div class="icons"></div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <div class="title">Aura</div>
                <div class="desc">Атака ближайших врагов</div>
                <div class="card-bottom">
                    <div class="icons"></div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <div class="title">Auto Swap</div>
                <div class="desc">Меняет предметы</div>
                <div class="card-bottom">
                    <div class="icons"></div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <div class="title">Hit Box</div>
                <div class="desc">Размер хитбокса</div>
                <div class="card-bottom">
                    <div class="icons"></div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
