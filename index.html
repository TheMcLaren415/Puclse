<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Visuals - Full Interactive</title>
    <style>
        :root {
            --accent: #7d5fff;
            --bg-dark: #050505;
            --panel-bg: #111116;
            --card-bg: #16161d;
            --text-main: #ffffff;
            --text-dim: #5c5c6d;
            --border: #1f1f2e;
        }

        body {
            background: radial-gradient(circle, #1a1a2e 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(125, 95, 255, 0.5);
        }
        .logo span { color: var(--accent); font-size: 30px; }

        /* Главное окно */
        .window {
            width: 820px;
            height: 480px;
            background: var(--panel-bg);
            border-radius: 18px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
        }

        /* Шапка */
        .header {
            padding: 25px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tabs { display: flex; gap: 15px; font-size: 14px; color: var(--text-dim); }
        .tabs span { cursor: pointer; transition: 0.2s; }
        .tabs span.active { color: var(--text-main); font-weight: bold; }

        .search-area {
            background: #1a1a23;
            padding: 8px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            border: 1px solid #2a2a3a;
        }
        .search-area input {
            background: none; border: none; color: white; font-size: 13px; outline: none; width: 180px; margin-left: 10px;
        }

        /* Контент */
        .content {
            padding: 0 35px 30px 35px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            overflow-y: auto;
            height: 100%;
        }

        /* Карточка */
        .card {
            background: var(--card-bg);
            padding: 16px 22px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .card:hover { border-color: #313145; background: #1c1c26; }
        .card-label { font-size: 14px; font-weight: 500; }

        .category-tag {
            font-size: 9px;
            text-transform: uppercase;
            background: rgba(125, 95, 255, 0.15);
            color: var(--accent);
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
            display: inline-block;
        }

        /* Переключатель */
        .switch {
            width: 38px;
            height: 20px;
            background: #2a2a3a;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .switch.active { background: var(--accent); }
        .switch::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            top: 3px; left: 3px;
            transition: 0.3s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        .switch.active::after { left: 21px; }

        /* Кнопка загрузки для конфигов */
        .dl-icon {
            width: 32px; height: 32px;
            background: #252533;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; color: #a0a0b0;
        }
        .dl-icon:hover { background: var(--accent); color: white; }

        /* Нижний Док */
        .dock {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 20, 0.95);
            padding: 12px 20px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .dock-btn {
            width: 46px;
            height: 46px;
            background: #1c1c26;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
            color: #666;
            opacity: 0.6;
        }
        .dock-btn.active { 
            background: var(--accent); 
            color: white; 
            opacity: 1; 
            box-shadow: 0 0 20px rgba(125, 95, 255, 0.4);
        }

        .config-item { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="logo"><span>⚡</span> PulseVisuals</div>

    <div class="window">
        <div class="header">
            <div class="tabs" id="tab-ui">
                </div>
            <div class="search-area">
                <span>🔍</span>
                <input type="text" id="global-search" placeholder="Поиск по всем разделам...">
            </div>
        </div>

        <div class="content" id="content-list">
            </div>

        <div class="dock">
            <div class="dock-btn active" onclick="nav('visuals', 0)">⚙️</div>
            <div class="dock-btn" onclick="nav('hud', 1)">🖼️</div>
            <div class="dock-btn" onclick="nav('configs', 2)">📄</div>
        </div>
    </div>

    <script>
        // БАЗА ДАННЫХ (Все 'enabled: true' по твоему желанию)
        const db = {
            visuals: [
                { id: 'v1', name: "Animations", enabled: true },
                { id: 'v2', name: "Aspect Ratio", enabled: true },
                { id: 'v3', name: "Block Overlay", enabled: true },
                { id: 'v4', name: "China Hat", enabled: true },
                { id: 'v5', name: "Crosshair", enabled: true },
                { id: 'v6', name: "Full Bright", enabled: true },
                { id: 'v7', name: "Particles", enabled: true },
                { id: 'v8', name: "Target ESP", enabled: true },
                { id: 'v9', name: "Trails", enabled: true }
            ],
            hud: [
                { id: 'h1', name: "Watermark", enabled: true },
                { id: 'h2', name: "Armor HUD", enabled: true },
                { id: 'h3', name: "Effect Notify", enabled: true },
                { id: 'h4', name: "Target HUD", enabled: true },
                { id: 'h5', name: "Hotkeys", enabled: true }
            ],
            configs: [
                { id: 'c1', name: "Default Profile", isCfg: true, date: "10.02 14:28" },
                { id: 'c2', name: "Анимчик • Anim4k", isCfg: true, date: "11.02 10:12" },
                { id: 'c3', name: "Флерни • Flerni", isCfg: true, date: "12.02 16:12" }
            ]
        };

        let currentCategory = 'visuals';

        function render() {
            const list = document.getElementById('content-list');
            const tabUi = document.getElementById('tab-ui');
            const query = document.getElementById('global-search').value.toLowerCase();
            
            list.innerHTML = '';

            // 1. Логика вкладок
            if (query === "") {
                if (currentCategory === 'configs') {
                    tabUi.innerHTML = '<span style="color:white; font-weight:bold">Конфигурации</span>';
                } else {
                    tabUi.innerHTML = `
                        <span class="${currentCategory==='visuals'?'active':''}" onclick="nav('visuals', 0)">Visuals</span> / 
                        <span class="${currentCategory==='hud'?'active':''}" onclick="nav('hud', 1)">HUD</span> / 
                        <span style="opacity:0.5">Utilities</span>
                    `;
                }
            } else {
                tabUi.innerHTML = `<span style="color:var(--accent)">Найдено по запросу: "${query}"</span>`;
            }

            // 2. Глобальный поиск
            let itemsToShow = [];
            if (query !== "") {
                // Ищем везде
                const all = [...db.visuals, ...db.hud, ...db.configs];
                itemsToShow = all.filter(i => i.name.toLowerCase().includes(query));
            } else {
                // Показываем только текущую категорию
                itemsToShow = db[currentCategory];
            }

            if (itemsToShow.length === 0) {
                list.innerHTML = '<div style="grid-column:span 2; text-align:center; color:#5c5c6d; margin-top:50px">Ничего не найдено</div>';
            }

            // 3. Создание карточек
            itemsToShow.forEach((item) => {
                const card = document.createElement('div');
                card.className = item.isCfg ? 'card config-item' : 'card';
                
                const isSearch = query !== "";

                if (item.isCfg) {
                    card.innerHTML = `
                        <div style="display:flex; flex-direction:column">
                            ${isSearch ? '<span class="category-tag">Configs</span>' : ''}
                            <span style="font-size:10px; color:var(--text-dim); margin-bottom:4px">${item.date}</span>
                            <span class="card-label">${item.name}</span>
                        </div>
                        <div class="dl-icon">📥</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div style="display:flex; flex-direction:column">
                            ${isSearch ? `<span class="category-tag">${item.id.startsWith('v')?'Visuals':'HUD'}</span>` : ''}
                            <span class="card-label">${item.name}</span>
                        </div>
                        <div class="switch ${item.enabled ? 'active' : ''}"></div>
                    `;

                    // Логика ВКЛ/ВЫКЛ
                    const sw = card.querySelector('.switch');
                    sw.onclick = function() {
                        item.enabled = !item.enabled;
                        this.classList.toggle('active');
                    };
                }
                list.appendChild(card);
            });
        }

        // Навигация
        function nav(cat, idx) {
            currentCategory = cat;
            document.getElementById('global-search').value = ""; // Сброс поиска при клике на иконки
            
            // Подсветка кнопок дока
            const btns = document.querySelectorAll('.dock-btn');
            btns.forEach(b => b.classList.remove('active'));
            if(btns[idx]) btns[idx].classList.add('active');
            
            render();
        }

        // Слушатель поиска
        document.getElementById('global-search').oninput = render;

        // Первый запуск
        render();
    </script>
</body>
</html>
