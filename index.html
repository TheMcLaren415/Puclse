<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Visuals - Mobile Friendly</title>
    <style>
        :root {
            --accent: #7d5fff;
            --bg-dark: #050505;
            --panel-bg: #111116;
            --card-bg: #16161d;
            --text-main: #ffffff;
            --text-dim: #5c5c6d;
            --border: #1f1f2e;
        }

        body {
            background: radial-gradient(circle, #1a1a2e 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .logo span { color: var(--accent); }

        /* Окно с поддержкой мобилок */
        .window {
            width: 90%;
            max-width: 820px;
            height: 70vh; /* На мобилках лучше фиксировать высоту */
            background: var(--panel-bg);
            border-radius: 18px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
        }

        .header {
            padding: 15px 20px;
            display: flex;
            flex-direction: column; /* На мобилках элементы друг под другом */
            gap: 15px;
        }

        @media (min-width: 600px) {
            .header { flex-direction: row; justify-content: space-between; }
        }

        .tabs { display: flex; gap: 12px; font-size: 13px; color: var(--text-dim); }
        .tabs span { cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .tabs span.active { color: var(--text-main); font-weight: bold; }

        .search-area {
            background: #1a1a23;
            padding: 8px 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            border: 1px solid #2a2a3a;
        }
        .search-area input {
            background: none; border: none; color: white; font-size: 13px; outline: none; width: 100%; margin-left: 8px;
        }

        /* Сетка контента: 2 колонки на ПК, 1 на телефоне */
        .content {
            padding: 0 20px 20px 20px;
            display: grid;
            grid-template-columns: 1fr; 
            gap: 10px;
            overflow-y: auto;
            flex: 1;
        }

        @media (min-width: 600px) {
            .content { grid-template-columns: 1fr 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 14px 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .switch {
            width: 36px; height: 18px;
            background: #2a2a3a; border-radius: 15px;
            position: relative; cursor: pointer; transition: 0.3s;
        }
        .switch.active { background: var(--accent); }
        .switch::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s;
        }
        .switch.active::after { left: 21px; }

        .dl-icon {
            padding: 6px 10px; background: #252533; border-radius: 8px; font-size: 14px;
        }

        /* Нижний Док */
        .dock {
            position: fixed;
            bottom: 20px;
            background: rgba(15, 15, 20, 0.95);
            padding: 10px 15px;
            border-radius: 20px;
            display: flex;
            gap: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .dock-btn {
            width: 40px; height: 40px;
            background: #1c1c26; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0.6; transition: 0.3s;
        }
        .dock-btn.active { background: var(--accent); opacity: 1; color: white; }

        .config-item { grid-column: 1 / -1; }
    </style>
</head>
<body>

    <div class="logo"><span>⚡</span> PulseVisuals</div>

    <div class="window">
        <div class="header">
            <div class="tabs" id="tab-ui">
                </div>
            <div class="search-area">
                <span>🔍</span>
                <input type="text" id="global-search" placeholder="Поиск...">
            </div>
        </div>

        <div class="content" id="content-list"></div>

        <div class="dock">
            <div class="dock-btn active" onclick="nav('visuals', 0)">⚙️</div>
            <div class="dock-btn" onclick="nav('hud', 1)">🖼️</div>
            <div class="dock-btn" onclick="nav('configs', 2)">📄</div>
        </div>
    </div>

    <script>
        const db = {
            visuals: [
                { name: "Animations", enabled: true },
                { name: "Target ESP", enabled: true },
                { name: "Full Bright", enabled: true },
                { name: "Trails", enabled: true },
                { name: "China Hat", enabled: true }
            ],
            hud: [
                { name: "Watermark", enabled: true },
                { name: "Armor HUD", enabled: true },
                { name: "Effect Notify", enabled: true }
            ],
            configs: [
                { name: "Default Profile", isCfg: true, date: "10.04" },
                { name: "Best Settings", isCfg: true, date: "11.04" }
            ]
        };

        let currentTab = 'visuals';

        function render() {
            const list = document.getElementById('content-list');
            const tabUi = document.getElementById('tab-ui');
            const query = document.getElementById('global-search').value.toLowerCase();
            list.innerHTML = '';

            // Обновляем вкладки (без Utilities)
            tabUi.innerHTML = `
                <span class="${currentTab==='visuals'?'active':''}" onclick="nav('visuals',0)">Visuals</span>
                <span style="color:#333">/</span>
                <span class="${currentTab==='hud'?'active':''}" onclick="nav('hud',1)">HUD</span>
                <span style="color:#333">/</span>
                <span class="${currentTab==='configs'?'active':''}" onclick="nav('configs',2)">Configs</span>
            `;

            let data = query === "" ? db[currentTab] : [...db.visuals, ...db.hud, ...db.configs].filter(i => i.name.toLowerCase().includes(query));

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = item.isCfg ? 'card config-item' : 'card';
                
                const control = item.isCfg 
                    ? `<div class="dl-icon">📥</div>` 
                    : `<div class="switch ${item.enabled ? 'active' : ''}" onclick="toggleStatus('${item.name}')"></div>`;

                card.innerHTML = `
                    <div style="display:flex; flex-direction:column">
                        ${item.date ? `<span style="font-size:10px; color:#5c5c6d">${item.date}</span>` : ''}
                        <span style="font-size:14px">${item.name}</span>
                    </div>
                    ${control}
                `;
                list.appendChild(card);
            });
        }

        function toggleStatus(name) {
            // Ищем элемент во всех разделах
            ['visuals', 'hud'].forEach(cat => {
                const item = db[cat].find(i => i.name === name);
                if (item) item.enabled = !item.enabled;
            });
            render();
        }

        function nav(cat, idx) {
            currentTab = cat;
            document.querySelectorAll('.dock-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
            render();
        }

        document.getElementById('global-search').oninput = render;
        render();
    </script>
</body>
</html>
