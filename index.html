<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pulse Visuals - Interactive Search</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --panel-bg: #111116;
            --card-bg: #16161d;
            --accent: #7d5fff;
            --text-main: #ffffff;
            --text-dim: #5c5c6d;
            --border: #22222e;
        }

        body {
            background: radial-gradient(circle, #1a1a2e 0%, #050505 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .logo { display: flex; align-items: center; gap: 8px; font-size: 22px; font-weight: bold; margin-bottom: 25px; }
        .logo span { color: var(--accent); font-size: 28px; }

        .window {
            width: 820px;
            height: 480px;
            background: var(--panel-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        .header { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; gap: 15px; font-size: 14px; color: var(--text-dim); }
        .tabs span { cursor: pointer; transition: 0.2s; }
        .tabs span.active { color: var(--text-main); }

        .search-area {
            background: #1a1a23;
            padding: 6px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2a2a3a;
        }
        .search-area input { background: none; border: none; color: white; font-size: 13px; outline: none; width: 140px; }

        .content { padding: 0 30px 20px 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; overflow-y: auto; height: 100%; }
        
        /* Стили для пустых результатов */
        .no-results { grid-column: span 2; text-align: center; color: var(--text-dim); margin-top: 50px; font-style: italic; }

        .card { background: var(--card-bg); padding: 14px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.2s; }
        .card:hover { border-color: #313145; background: #1c1c26; }
        .card-label { font-size: 14px; font-weight: 500; }

        .tog { width: 38px; height: 20px; background: #2a2a3a; border-radius: 15px; position: relative; cursor: pointer; transition: 0.3s; }
        .tog.active { background: var(--accent); }
        .tog::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .tog.active::after { left: 21px; }

        .dl-icon { width: 32px; height: 32px; background: #252533; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #a0a0b0; cursor: pointer; }
        .dl-icon:hover { background: var(--accent); color: white; }

        .dock { position: absolute; bottom: -75px; left: 50%; transform: translateX(-50%); background: rgba(15, 15, 20, 0.95); padding: 10px 18px; border-radius: 16px; display: flex; gap: 12px; border: 1px solid var(--border); backdrop-filter: blur(8px); }
        .dock-btn { width: 42px; height: 42px; background: #1c1c26; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; opacity: 0.6; }
        .dock-btn.active { background: var(--accent); opacity: 1; }

        .config-item { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="logo"><span>⚡</span> PulseVisuals</div>

    <div class="window">
        <div class="header">
            <div class="tabs" id="tab-container">
                </div>
            <div class="search-area">
                <span>🔍</span>
                <input type="text" id="search-input" placeholder="Поиск" oninput="handleSearch()">
            </div>
        </div>

        <div class="content" id="main-content">
            </div>

        <div class="dock">
            <div class="dock-btn active" title="Visuals" onclick="changeSection('visuals', 0)">⚙️</div>
            <div class="dock-btn" title="HUD" onclick="changeSection('hud', 1)">🖼️</div>
            <div class="dock-btn" title="Social" onclick="changeSection('social', 2)">👥</div>
            <div class="dock-btn" title="Gifts" onclick="changeSection('box', 3)">🎁</div>
            <div class="dock-btn" title="Configs" onclick="changeSection('configs', 4)">📄</div>
        </div>
    </div>

    <script>
        // База данных элементов
        const sections = {
            visuals: [
                { name: "Animations", active: true }, { name: "Target ESP", active: true },
                { name: "Trails", active: true }, { name: "World Customizer", active: true },
                { name: "Full Bright", active: true }, { name: "Nimb", active: false },
                { name: "Particles", active: false }, { name: "Render Tweaks", active: false },
                { name: "Block Overlay", active: true }, { name: "China Hat", active: false }
            ],
            hud: [
                { name: "Watermark", active: true }, { name: "Effect Notify", active: true },
                { name: "Armor HUD", active: false }, { name: "Target HUD", active: false },
                { name: "Potions", active: false }, { name: "Hotkeys", active: false }
            ],
            configs: [
                { name: "Default", date: "10.02 14:28", isConfig: true },
                { name: "Анимчик • Anim4k", date: "11.02 10:12", isConfig: true },
                { name: "Флерни • Flerni", date: "12.02 16:12", isConfig: true }
            ]
        };

        let currentSection = 'visuals';

        // Функция отрисовки
        function renderContent(filter = '') {
            const container = document.getElementById('main-content');
            const tabContainer = document.getElementById('tab-container');
            container.innerHTML = '';

            // Обновляем вкладки
            if (currentSection === 'configs') {
                tabContainer.innerHTML = '<span style="color:white; font-weight:bold">Конфигурации</span>';
            } else {
                tabContainer.innerHTML = `
                    <span class="${currentSection === 'visuals' ? 'active' : ''}" onclick="changeSection('visuals', 0)">Visuals</span> / 
                    <span class="${currentSection === 'hud' ? 'active' : ''}" onclick="changeSection('hud', 1)">HUD</span> / 
                    <span>Utilities</span>
                `;
            }

            // Фильтруем данные
            const items = sections[currentSection] || [];
            const filteredItems = items.filter(item => 
                item.name.toLowerCase().includes(filter.toLowerCase())
            );

            if (filteredItems.length === 0) {
                container.innerHTML = '<div class="no-results">Ничего не найдено...</div>';
                return;
            }

            filteredItems.forEach(item => {
                const div = document.createElement('div');
                div.className = item.isConfig ? 'card config-item' : 'card';
                
                if (item.isConfig) {
                    div.innerHTML = `
                        <div style="display:flex; flex-direction:column">
                            <span style="font-size:10px; color:#5c5c6d; margin-bottom:4px">${item.date}</span>
                            <span class="card-label">${item.name}</span>
                        </div>
                        <div class="dl-icon">📥</div>
                    `;
                } else {
                    div.innerHTML = `
                        <span class="card-label">${item.name}</span>
                        <div class="tog ${item.active ? 'active' : ''}" onclick="this.classList.toggle('active')"></div>
                    `;
                }
                container.appendChild(div);
            });
        }

        // Обработка ввода в поиск
        function handleSearch() {
            const query = document.getElementById('search-input').value;
            renderContent(query);
        }

        // Переключение разделов (кнопки в доке)
        function changeSection(name, btnIdx) {
            currentSection = name;
            // Очищаем поиск при переходе
            document.getElementById('search-input').value = '';
            // Активная кнопка в доке
            document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.dock-btn')[btnIdx].classList.add('active');
            
            renderContent();
        }

        // Инициализация
        renderContent();
    </script>
</body>
</html>
