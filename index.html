<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pulse Visuals - Fix Search</title>
    <style>
        :root {
            --panel-bg: #111116;
            --card-bg: #16161d;
            --accent: #7d5fff;
            --text-main: #ffffff;
            --text-dim: #5c5c6d;
            --border: #22222e;
        }

        body {
            background: #050505;
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .window {
            width: 820px;
            height: 480px;
            background: var(--panel-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        
        .tabs { display: flex; gap: 15px; font-size: 14px; color: var(--text-dim); }
        .tabs span { cursor: pointer; }
        .tabs span.active { color: var(--text-main); font-weight: bold; }

        .search-area {
            background: #1a1a23;
            padding: 6px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            border: 1px solid #2a2a3a;
        }
        
        .search-area input {
            background: none; border: none; color: white; 
            outline: none; width: 140px; margin-left: 8px;
        }

        .content { 
            padding: 0 30px 20px 30px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            overflow-y: auto; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 14px 20px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        /* Переключатель */
        .tog { 
            width: 38px; height: 20px; background: #2a2a3a; 
            border-radius: 15px; position: relative; cursor: pointer; 
        }
        .tog.active { background: var(--accent); }
        .tog::after { 
            content: ''; position: absolute; width: 14px; height: 14px; 
            background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.2s;
        }
        .tog.active::after { left: 21px; }

        /* Иконка скачать */
        .dl-icon { 
            width: 32px; height: 32px; background: #252533; 
            border-radius: 8px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; 
        }

        .dock { 
            position: absolute; bottom: -70px; left: 50%; 
            transform: translateX(-50%); background: #0f0f14; 
            padding: 10px; border-radius: 16px; display: flex; gap: 10px;
        }
        
        .dock-btn { 
            width: 40px; height: 40px; background: #1c1c26; 
            border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; opacity: 0.5;
        }
        .dock-btn.active { background: var(--accent); opacity: 1; }

        .config-item { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="window">
        <div class="header">
            <div id="tab-title" class="tabs">
                </div>
            <div class="search-area">
                <span>🔍</span>
                <input type="text" id="main-search" placeholder="Поиск">
            </div>
        </div>

        <div class="content" id="main-list">
            </div>

        <div class="dock">
            <div class="dock-btn active" onclick="setMode('visuals', 0)">⚙️</div>
            <div class="dock-btn" onclick="setMode('hud', 1)">🖼️</div>
            <div class="dock-btn" onclick="setMode('configs', 4)">📄</div>
        </div>
    </div>

    <script>
        const db = {
            visuals: [
                { name: "Animations", state: true }, { name: "Target ESP", state: true },
                { name: "Trails", state: true }, { name: "World Customizer", state: true },
                { name: "Full Bright", state: true }, { name: "Nimb", state: false },
                { name: "Particles", state: true }, { name: "China Hit", state: false }
            ],
            hud: [
                { name: "Watermark", state: true }, { name: "Effect Notify", state: true },
                { name: "Armor HUD", state: false }, { name: "Target HUD", state: false }
            ],
            configs: [
                { name: "Default", date: "10.02 14:28", isCfg: true },
                { name: "Анимчик • Anim4k", date: "11.02 10:12", isCfg: true },
                { name: "Флерни • Flerni", date: "12.02 16:12", isCfg: true }
            ]
        };

        let currentMode = 'visuals';

        const searchInput = document.getElementById('main-search');
        const listContainer = document.getElementById('main-list');
        const tabTitle = document.getElementById('tab-title');

        function render() {
            const query = searchInput.value.toLowerCase();
            listContainer.innerHTML = '';

            // Рендер вкладок
            if (currentMode === 'configs') {
                tabTitle.innerHTML = '<span style="color:white">Конфигурации</span>';
            } else {
                tabTitle.innerHTML = `
                    <span class="${currentMode==='visuals'?'active':''}" onclick="setMode('visuals',0)">Visuals</span> / 
                    <span class="${currentMode==='hud'?'active':''}" onclick="setMode('hud',1)">HUD</span>
                `;
            }

            // Фильтрация и вывод
            const items = db[currentMode] || [];
            items.forEach(item => {
                if (item.name.toLowerCase().includes(query)) {
                    const div = document.createElement('div');
                    div.className = item.isCfg ? 'card config-item' : 'card';
                    
                    if (item.isCfg) {
                        div.innerHTML = `
                            <div style="display:flex; flex-direction:column">
                                <span style="font-size:10px; color:#5c5c6d">${item.date}</span>
                                <span>${item.name}</span>
                            </div>
                            <div class="dl-icon">📥</div>
                        `;
                    } else {
                        div.innerHTML = `
                            <span>${item.name}</span>
                            <div class="tog ${item.state ? 'active' : ''}" onclick="item.state=!item.state; this.classList.toggle('active')"></div>
                        `;
                    }
                    listContainer.appendChild(div);
                }
            });
        }

        // Ключевой момент: слушаем ввод
        searchInput.addEventListener('input', render);

        function setMode(mode, idx) {
            currentMode = mode;
            document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.dock-btn')[idx === 4 ? 2 : idx].classList.add('active');
            render();
        }

        // Первый запуск
        render();
    </script>
</body>
</html>
